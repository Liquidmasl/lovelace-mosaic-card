<svg width="620" height="228" viewBox="0 0 620 228" xmlns="http://www.w3.org/2000/svg">
  <rect width="620" height="228" fill="#111827" rx="8"/>

  <!-- Card A: 6×2 top-left (entity / room overview) -->
  <rect x="14" y="14" width="292" height="96" rx="6" fill="#1f2937"/>
  <circle cx="44" cy="62" r="18" fill="#1e3a5f"/>
  <text x="44" y="68" font-family="system-ui,sans-serif" font-size="16" text-anchor="middle" fill="#60a5fa">⚡</text>
  <text x="75" y="52" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#e5e7eb">Living Room</text>
  <text x="75" y="68" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280">Lights on · 22 °C</text>
  <rect x="252" y="53" width="38" height="20" rx="10" fill="#2563eb"/>
  <circle cx="280" cy="63" r="7" fill="#fff"/>

  <!-- Card B: 3×2 top-mid (temperature) -->
  <rect x="314" y="14" width="142" height="96" rx="6" fill="#1f2937"/>
  <text x="385" y="47" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Temperature</text>
  <text x="385" y="76" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#fbbf24" text-anchor="middle">22.4°</text>
  <text x="385" y="96" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">↑ 1.2° since morning</text>

  <!-- Card C: 3×4 right-tall (camera + motion) -->
  <rect x="464" y="14" width="142" height="200" rx="6" fill="#1f2937"/>
  <rect x="474" y="24" width="122" height="78" rx="4" fill="#0f172a"/>
  <text x="535" y="68" font-family="system-ui,sans-serif" font-size="28" text-anchor="middle" fill="#334155">📷</text>
  <text x="535" y="126" font-family="system-ui,sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Front Door</text>
  <text x="535" y="143" font-family="system-ui,sans-serif" font-size="10" fill="#10b981" text-anchor="middle">● Armed</text>
  <line x1="474" y1="158" x2="606" y2="158" stroke="#374151" stroke-width="1"/>
  <text x="535" y="178" font-family="system-ui,sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">Motion sensor</text>
  <text x="535" y="196" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">No motion</text>

  <!-- Card D: 3×2 bottom-left (humidity) -->
  <rect x="14" y="118" width="142" height="96" rx="6" fill="#1f2937"/>
  <text x="85" y="148" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Humidity</text>
  <text x="85" y="176" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#38bdf8" text-anchor="middle">65%</text>
  <text x="85" y="196" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Comfortable</text>

  <!-- Card E: 3×2 bottom-mid-left (power) -->
  <rect x="164" y="118" width="142" height="96" rx="6" fill="#1f2937"/>
  <text x="235" y="148" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Power</text>
  <text x="235" y="176" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#f59e0b" text-anchor="middle">1.2 kW</text>
  <text x="235" y="196" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">↓ 0.3 kW from avg</text>

  <!-- Card F: 3×2 bottom-mid-right (media player) -->
  <rect x="314" y="118" width="142" height="96" rx="6" fill="#1f2937"/>
  <text x="385" y="148" font-family="system-ui,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Speaker</text>
  <circle cx="385" cy="172" r="14" fill="#1e3a5f"/>
  <text x="387" y="178" font-family="system-ui,sans-serif" font-size="14" fill="#60a5fa" text-anchor="middle">▶</text>
  <text x="385" y="202" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Spotify · Playing</text>
</svg>
